<!-- bookshelf/templates/librarian_view.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Librarian Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f8f9fa;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome, Librarian {{ user.username }}!</h1>
        <p>This is your dashboard.</p>

        <ul>
            <li><a href="#">View all books</a></li>
            <li><a href="#">Manage members</a></li>
            <li><a href="#">Check borrowed books</a></li>
        </ul>
    </div>
</body>
</html>
